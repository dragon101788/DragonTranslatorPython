<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Bergamot Worker API 测试</title>
<style>
body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #1a1a2e; color: #e0e0e0; }
h1 { color: #7ec8e3; }
button { background: #0f3460; color: #e0e0e0; border: 1px solid #1a5276; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
button:hover:not(:disabled) { background: #1a5276; }
button:disabled { opacity: 0.4; }
button.primary { background: #1a6b3c; border-color: #27ae60; }
textarea { width: 100%; padding: 10px; border-radius: 6px; font-size: 14px; box-sizing: border-box; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; min-height: 80px; }
#log { margin-top: 12px; padding: 10px; border-radius: 6px; background: #0a0a1a; border: 1px solid #1a1a3e; font-family: monospace; font-size: 12px; color: #7ec8e3; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>🧪 Bergamot Worker API 测试</h1>
<p id="status">⏳ 初始化中...</p>
<textarea id="input">What time is the meeting tomorrow?</textarea>
<button class="primary" id="btn" disabled onclick="doTranslate()">⚡ 翻译</button>
<pre id="log"></pre>

<script>
const LOG = [];
function log(msg) {
  LOG.push(`[${new Date().toLocaleTimeString()}] ${msg}`);
  document.getElementById('log').textContent = LOG.join('\n');
}

// ===== Load translator-worker.js globals =====
// translator-worker.js defines BergamotTranslatorWorker class and exports Module
// It needs bergamot-translator-worker.js (Emscripten glue) via importScripts,
// which doesn't work on main thread. We pre-eval the glue and mock importScripts.

async function init() {
  try {
    // 1. Load Emscripten glue JS (contains Module runtime)
    const glueResp = await fetch('./bergamot-translator-worker.js');
    const glueJs = await glueResp.text();

    // 2. Load translator-worker.js wrapper
    const wrapResp = await fetch('./translator-worker.js');
    const wrapJs = await wrapResp.text();

    // 3. Load WASM binary
    const wasmResp = await fetch('./bergamot-translator-worker.wasm');
    const wasmBinary = await wasmResp.arrayBuffer();
    log(`资源加载完成: glue=${glueJs.length} wrap=${wrapJs.length} wasm=${(wasmBinary.byteLength/1e6).toFixed(1)}MB`);

    // 4. Mock importScripts (translator-worker.js calls this from loadModule)
    self.importScripts = function(path) {
      log(`importScripts(${path}) 被调用 — 使用预加载的 glue`);
      // The glue code uses `var Module = typeof Module != "undefined" ? Module : {};`
      // and then populates Module.asm, etc.
      (0, eval)(glueJs); // indirect eval in global scope
    };

    // 5. Eval translator-worker.js in one shot, exposing class to self
    // (class in indirect eval doesn't become globalThis property)
    (0, eval)(wrapJs + ';\nself._BWT = BergamotTranslatorWorker;\n');
    log('translator-worker.js 已执行');

    // 6. Get exposed class
    const BWT = self._BWT;
    if (!BWT) throw new Error('BergamotTranslatorWorker 未定义');

    // We need to override loadModule to use our pre-loaded WASM
    // Instead of fetch+instantiateStreaming, use instantiate with pre-loaded binary
    const origLoadModule = BWT.prototype.loadModule;
    BWT.prototype.loadModule = function() {
      return new Promise((resolve, reject) => {
        Object.assign(Module, {
          wasmBinary,
          onRuntimeInitialized: () => resolve(Module),
          instantiateWasm: (info, accept) => {
            // Setup gemm fallbacks (matching linkFallbackIntGemm)
            const mapping = Object.entries(BWT.GEMM_TO_FALLBACK_FUNCTIONS_MAP).map(([key, name]) => {
              return [key, (...args) => {
                const asm = Module['asm'];
                if (!asm) return 0;
                if (typeof asm[name] === 'function') return asm[name](...args);
                const altName = '_' + name;
                if (typeof asm[altName] === 'function') return asm[altName](...args);
                return 0;
              }];
            });
            info['wasm_gemm'] = Object.fromEntries(mapping);
            WebAssembly.instantiate(wasmBinary, info)
              .then(r => accept(r.instance)).catch(reject);
            return {};
          },
        });
        self.importScripts('./bergamot-translator-worker.js'); // will use our mock
      });
    };

    const worker = new BWT({ cacheSize: 0 });
    log('BergamotTranslatorWorker 实例已创建');

    // 7. Initialize
    await worker.initialize({ cacheSize: 0 });
    log('Worker 初始化完成');

    // 8. Load enzh model
    const modelDir = 'enzh';
    const [modelBuf, lexBuf, vocabBuf] = await Promise.all([
      fetch(`./${modelDir}/model.enzh.intgemm.alphas.bin`).then(r => r.arrayBuffer()),
      fetch(`./${modelDir}/lex.50.50.enzh.s2t.bin`).then(r => r.arrayBuffer()),
      fetch(`./${modelDir}/vocab.enzh.spm`).then(r => r.arrayBuffer()),
    ]);
    log(`模型文件加载完成: model=${(modelBuf.byteLength/1e6).toFixed(1)}MB lex=${(lexBuf.byteLength/1e6).toFixed(1)}MB vocab=${(vocabBuf.byteLength/1e6).toFixed(1)}MB`);

    await worker.loadTranslationModel({ from: 'en', to: 'zh' }, {
      model: modelBuf,
      shortlist: lexBuf,
      vocabs: [vocabBuf],
      config: {},
    });
    log('enzh 模型已加载');

    // 9. Store for translation
    window._worker = worker;
    document.getElementById('btn').disabled = false;
    document.getElementById('status').textContent = '✅ 就绪';
    log('=== 一切就绪，可以翻译 ===');
  } catch (e) {
    document.getElementById('status').textContent = '❌ 失败';
    log(`ERROR: ${e.message || e}\n${e.stack || ''}`);
    console.error(e);
  }
}

async function doTranslate() {
  const worker = window._worker;
  if (!worker) return;
  const text = document.getElementById('input').value.trim();
  if (!text) return;
  document.getElementById('btn').disabled = true;
  const t0 = performance.now();
  try {
    const responses = await worker.translate({
      models: [{ from: 'en', to: 'zh' }],
      texts: [{ text, html: false, qualityScores: false }],
    });
    const result = responses[0].target.text;
    log(`✅ 翻译完成 [${(performance.now()-t0).toFixed(0)}ms]: ${result}`);
  } catch (e) {
    log(`❌ 翻译失败: ${e.message || e}`);
  }
  document.getElementById('btn').disabled = false;
}

init();
</script>
</body>
</html>
